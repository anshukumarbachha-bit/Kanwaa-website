<!DOCTYPE html>
<html lang="en">
<head>
    <title>Secure Order | KANWAA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo">KANWAA</div></nav>

    <div class="order-box reveal">
        <h2>SECURE ORDER TERMINAL</h2>
        <p style="color: #8892b0; margin-bottom: 30px;">Minimum order quantity: 50 Boxes</p>
        
        <input type="text" id="custName" placeholder="Full Professional Name">
        <input type="tel" id="custPhone" placeholder="Contact Number">
        <select id="prodSelect">
            <option value="500ml">Elite 500ml (Box of 24)</option>
            <option value="1L">Classic 1L (Box of 12)</option>
            <option value="2L">Grand 2L (Box of 9)</option>
            <option value="20L">Corporate 20L Can</option>
        </select>
        <input type="number" id="qty" placeholder="Quantity (Min 50)">
        <button class="btn-premium" style="width: 100%;" onclick="processOrder()">PLACE SECURE ORDER</button>
    </div>

    <script>
        function processOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const product = document.getElementById('prodSelect').value;
            const qty = document.getElementById('qty').value;

            if(qty < 50 && product !== '20L') {
                alert("Minimum order for boxes is 50.");
                return;
            }

            // Stealth Logic: User thinks it's a website order, but it sends to your WhatsApp
            let message = `🚀 *NEW KANWAA ORDER* 🚀\n\n👤 *Client:* ${name}\n📞 *Contact:* ${phone}\n📦 *Product:* ${product}\n🔢 *Quantity:* ${qty}\n\n_System Generated Order_`;
            
            // Ye background mein trigger hoga
            window.open(`https://api.whatsapp.com/send?phone=919508810630&text=${encodeURIComponent(message)}`, '_blank');
            
            alert("Order Submitted Successfully. Our dispatch team will contact you.");
        }
    </script>
</body>
</html>
