<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Now | Kanwaa</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function sendOrder() {
            let name = document.getElementById('name').value;
            let pin = document.getElementById('pin').value;
            let product = document.getElementById('product').value;
            let qty = document.getElementById('qty').value;
            let msg = `Kanwaa Order:%0A- Name: ${name}%0A- Pincode: ${pin}%0A- Product: ${product}%0A- Qty: ${qty}`;
            window.open(`https://wa.me/919508810630?text=${msg}`);
        }
    </script>
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="Kanwaa"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="process.html">Process</a>
            <a href="products.html">Products</a>
            <a href="order.html" class="active">Order Now</a>
        </nav>
    </header>

    <section class="order-box">
        <h2>Place Your Order</h2>
        <input type="text" id="name" placeholder="Your Name"><br>
        <input type="number" id="pin" placeholder="Enter Pincode"><br>
        <select id="product">
            <option>20L Can (Local Only)</option>
            <option>1L Box (Min 30)</option>
            <option>500ml Box (Min 30)</option>
            <option>2L Box (Min 30)</option>
        </select><br>
        <input type="number" id="qty" placeholder="Total Boxes/Cans"><br>
        <button onclick="sendOrder()" class="btn">Order on WhatsApp</button>
    </section>
</body>
</html>
