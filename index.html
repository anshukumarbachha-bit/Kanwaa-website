<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANWAA | Every Drop, Pure Perfection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">KANWAA</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="science.html">Science</a>
            <a href="products.html">Store</a>
        </div>
    </nav>

    <section class="hero">
        <div>
            <p style="color:var(--primary); font-weight: bold; letter-spacing: 3px;">ESTABLISHED 2026</p>
            <h1>Every Drop, <br><span>Pure Perfection.</span></h1>
            <p>At Kanwaa, we don’t just deliver water — we deliver purity, trust, and a healthier lifestyle. Because for us, water is a promise of health.</p>
            <a href="about.html" class="btn-explore">EXPLORE KANWAA <i class="fas fa-arrow-right"></i></a>
        </div>
    </section>

    <div class="container">
        <div class="checker">
            <h3>Check Delivery Availability</h3>
            <input type="text" id="pincode" placeholder="Enter Pincode">
            <button class="btn-explore" style="padding: 10px 30px;" onclick="checkArea()">Verify</button>
            <p id="checkMsg" style="margin-top:10px;"></p>
        </div>
    </div>

    <script>
        function checkArea() {
            const pin = document.getElementById('pincode').value;
            const msg = document.getElementById('checkMsg');
            const areas = ["812001", "812002", "853204", "854301"];
            if(areas.includes(pin)) {
                msg.innerText = "✓ Yes! We are delivering in your area.";
                msg.style.color = "white";
            } else {
                msg.innerText = "× Sorry, we haven't reached your area yet.";
                msg.style.color = "yellow";
            }
        }
    </script>
</body>
</html>
