<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store | Kanwaa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo">KANWAA</div><div class="nav-links"><a href="index.html">Home</a><a href="products.html">Store</a></div></nav>

    <section class="section">
        <div class="container">
            <h2 class="title">Select Your <span>Hydration</span></h2>
            <div class="grid">
                <div class="p-card">
                    <img src="bottle-500.png" alt="500ml">
                    <h3>500ml Compact Box</h3>
                    <p>Box of 24 Units</p>
                    <div class="price">₹90</div>
                    <button class="btn-explore" onclick="showOrder('500ml Compact Box (₹90)')">Order Now</button>
                </div>
                <div class="p-card">
                    <img src="bottle-1l.png" alt="1L">
                    <h3>1 Litre Classic Box</h3>
                    <p>Box of 12 Units</p>
                    <div class="price">₹120</div>
                    <button class="btn-explore" onclick="showOrder('1 Litre Classic Box (₹120)')">Order Now</button>
                </div>
                <div class="p-card">
                    <img src="bottle-2l.png" alt="2L">
                    <h3>2 Litre Mega Box</h3>
                    <p>Box of 9 Units</p>
                    <div class="price">₹230</div>
                    <button class="btn-explore" onclick="showOrder('2 Litre Mega Box (₹230)')">Order Now</button>
                </div>
                <div class="p-card">
                    <img src="can-20l.png" alt="20L">
                    <h3>20 Litre Corporate Jar</h3>
                    <p>Food Grade Reusable</p>
                    <div class="price">₹100</div>
                    <button class="btn-explore" onclick="showOrder('20 Litre Corporate Jar (₹100)')">Order Now</button>
                </div>
            </div>

            <div id="orderSection" class="order-form" style="display:none; margin-top:100px;">
                <h2 style="text-align:center;">Secure Checkout</h2>
                <p id="selectedProd" style="text-align:center; color:var(--primary);"></p>
                <input type="text" id="name" placeholder="Full Name">
                <input type="tel" id="phone" placeholder="Mobile Number">
                <textarea id="address" placeholder="Delivery Address"></textarea>
                <input type="number" id="qty" placeholder="Quantity (Min 50 Boxes)">
                <button class="btn-explore" style="width:100%" onclick="placeOrder()">PLACE ORDER NOW</button>
            </div>
        </div>
    </section>

    <script>
        let selected = "";
        function showOrder(p) {
            selected = p;
            document.getElementById('orderSection').style.display = 'block';
            document.getElementById('selectedProd').innerText = "Ordering: " + p;
            window.scrollTo(0, document.body.scrollHeight);
        }

        function placeOrder() {
            const n = document.getElementById('name').value;
            const ph = document.getElementById('phone').value;
            const add = document.getElementById('address').value;
            const q = document.getElementById('qty').value;

            if(!n || !ph || !add || !q) { alert("Please fill all details."); return; }
            if(q < 50 && !selected.includes("20 Litre")) { alert("Minimum bulk order is 50 boxes."); return; }

            // Piche se notification aapko aayega, user ko bus confirmation dikhega
            const msg = `⚡NEW ORDER⚡\nProduct: ${selected}\nName: ${n}\nPhone: ${ph}\nAddress: ${add}\nQty: ${q}`;
            window.open(`https://api.whatsapp.com/send?phone=919508810630&text=${encodeURIComponent(msg)}`, '_blank');
            
            alert("Order Placed Successfully! Our team will verify and contact you.");
        }
    </script>
</body>
</html>
